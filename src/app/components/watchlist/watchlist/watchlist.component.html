<div class="container mt-4">
  <h3 class="text-light bg-primary p-2 rounded mb-4">My Watchlist</h3>

  <div *ngIf="watchlist.length > 0; else empty" class="row">
    <div class="col-md-4 mb-4" *ngFor="let movie of watchlist">
      <div class="card h-100 shadow-sm">
        <a [routerLink]="['/movies', movie.id]" class="text-decoration-none text-dark">
          <img [src]="movie.poster" class="card-img-top" alt="{{ movie.title }}">
          <div class="card-body">
            <h5 class="card-title">{{ movie.title }}</h5>
            <p class="card-text">{{ movie.description | truncate:100 }}</p>
          </div>
        </a>
        <div class="card-footer text-center">
          <button class="btn btn-sm btn-danger" (click)="remove(movie.id)">Remove from Watchlist</button>
        </div>
      </div>
    </div>
  </div>

  <ng-template #empty>
    <p class="text-center mt-4 text-muted">Your watchlist is empty.</p>
  </ng-template>
</div>
