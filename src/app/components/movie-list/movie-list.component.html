<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="text-primary">Movies</h3>
    <div class="d-flex align-items-center">
      <label class="me-2">Filter by Category:</label>
      <select class="form-select w-auto" [(ngModel)]="filteredCategory">
        <option value="All">All</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let movie of (movies$ | async) | categoryFilter:filteredCategory">
      <div class="card h-100 shadow-sm">

        <a [routerLink]="['/movies', movie.id]" class="text-decoration-none text-dark">
          <img *ngIf="movie.poster; else noPoster" 
               [src]="movie.poster" 
               class="card-img-top img-fluid" 
               alt="{{ movie.title }}">
          <ng-template #noPoster>
            <img src="assets/default-movie.png" class="card-img-top img-fluid" alt="No Poster">
          </ng-template>

          <div class="card-body">
            <h5 class="card-title">{{ movie.title }}</h5>
            <p class="card-text"><strong>Category:</strong> {{ movie.category }}</p>
            <p class="card-text"><strong>Rating:</strong> {{ movie.rating }}</p>
            <p class="card-text">{{ movie.description | truncate:100 }}</p>
          </div>
        </a>
<div class="card-footer d-flex justify-content-between">
  <button class="btn btn-sm btn-success"
          [disabled]="watchlistService.isInWatchlist(movie.id)"
          (click)="watchlistService.addToWatchlist(movie)">
    {{ watchlistService.isInWatchlist(movie.id) ? 'Added' : 'Add to Watchlist' }}
  </button>

  <button class="btn btn-sm btn-danger" (click)="removeMovie(movie.id)">
    Remove
  </button>
</div>


      </div>
    </div>
  </div>

  <ng-template #noMovies>
    <p class="text-center mt-4 text-muted">No movies available.</p>
  </ng-template>
</div>
